root = "."
testdata_dir = "testdata"
#tmp_dir = "tmp"

[build]
  args_bin = []
  bin = './bin/andrew_mccall_com -DSN="admin:secretpassword1234@tcp(127.0.0.1:3309)/andrew_mccall_com?parseTime=true" -is_production=false -site_port=:8080 -site_title=andrew mccall golang development'
  cmd = "make run"
  delay = 1000
  exclude_dir = []
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html","gohtml"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
